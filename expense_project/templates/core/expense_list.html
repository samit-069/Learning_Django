<!DOCTYPE html>
<head>

</head>
<body>
    <h1>Personal Expense Dashboard</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Date Added</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in all_expenses %}
            <tr>
                <td>{{expense.id}}</td>
                <td>{{expense.title}}</td>
                <td>{{expense.category}}</td>
                <td>{{expense.date_added| date:"F d, Y"}}</td>
                <td>Rs.{{expense.amount}}</td>
            </tr>
            {% empty %}
            <tr>
                <td><b>No expense found</b></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="total_box">
        <strong>Total Amount Spend:</strong> Rs.{{total_spent}}
    </div>
</body>
</html>
