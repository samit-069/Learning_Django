<!DOCTYPE html>
<head>
    <meta = charset="UTF-8">
    <title>Expense Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #1e1e24;
            color: #fff;
        }
        h1{
            color: #b70505;
            border-bottom: 2px solid #514d4d;
            padding-bottom: 10px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            background: #2a2a35; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid #3e3e4f; 
        }
        th { 
            background-color: #4CAF50; 
            color: white; 
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        tr:hover { 
            background-color: #323242; 
        }
        .total-box { 
            background: #2a2a35; 
            padding: 20px; 
            border-left: 5px solid #4CAF50; 
            margin-top: 25px; 
            font-size: 20px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 0 8px 8px 0;
            display: inline-block;
        }
        .total-box strong {
            color: #4CAF50;
        }
    </style>    
</head>
<body>
    <h1>Personal Expense Dashboard</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Date Added</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in all_expenses %}
            <tr>
                <td>{{expense.id}}</td>
                <td>{{expense.title}}</td>
                <td>{{expense.category}}</td>
                <td>{{expense.date_added| date:"F d, Y"}}</td>
                <td>Rs.{{expense.amount}}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" style="text-align: center; color: gray;">No expense found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="total_box">
        <strong>Total Amount Spend:</strong> Rs.{{total_spent}}
    </div>
</body>
</html>
